# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -ldflags "-X main.version=${{ steps.version.outputs.version }}"

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Decode signing certificate
        shell: bash
        run: echo "${{ secrets.WINDOWS_CERT_PFX_BASE64 }}" | base64 --decode > "$GITHUB_WORKSPACE/cert.pfx"

      - name: Pack and sign
        shell: bash
        run: |
          vpk pack \
            --packId ticketsmith \
            --packVersion ${{ steps.version.outputs.version }} \
            --packDir build/bin \
            --mainExe ticketsmith.exe \
            --packTitle TicketSmith \
            --packAuthors "Aswin Biju" \
            --icon build/windows/icon.ico \
            --delta None \
            --verbose \
            --signParams "/f $GITHUB_WORKSPACE/cert.pfx /p ${{ secrets.WINDOWS_CERT_PASSWORD }} /fd sha256 /tr http://timestamp.digicert.com /td sha256"

      - name: Upload to GitHub Releases
        run: |
          vpk upload github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }} --publish --merge --channel win --tag ${{ github.ref_name }} --releaseName "TicketSmith ${{ github.ref_name }}"
