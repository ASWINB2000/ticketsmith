# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -ldflags "-X main.version=${{ steps.version.outputs.version }}"

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Decode signing certificate
        shell: bash
        run: echo "${{ secrets.WINDOWS_CERT_PFX_BASE64 }}" | base64 --decode > "$GITHUB_WORKSPACE/cert.pfx"

      - name: Pack and sign
        shell: bash
        run: |
          vpk pack \
            --packId ticketsmith \
            --packVersion ${{ steps.version.outputs.version }} \
            --packDir build/bin \
            --mainExe ticketsmith.exe \
            --packTitle TicketSmith \
            --packAuthors "Aswin Biju" \
            --icon build/windows/icon.ico \
            --delta None \
            --verbose \
            --signParams "/f $GITHUB_WORKSPACE/cert.pfx /p ${{ secrets.WINDOWS_CERT_PASSWORD }} /fd sha256 /tr http://timestamp.digicert.com /td sha256"

      - name: Upload to GitHub Releases
        run: |
          vpk upload github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }} --publish --merge --channel win --tag ${{ github.ref_name }} --releaseName "TicketSmith ${{ github.ref_name }}"

      - name: Auto-generate release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # vpk upload github leaves the release body empty (Velopack has no
        # auto-notes feature — its own --releaseNotes flag just points to a
        # markdown file you'd have to hand-write). "gh release create
        # --generate-notes" would do this at creation time, but vpk already
        # created the release, so we hit the same underlying REST endpoint
        # directly and apply the result with "release edit" instead. This
        # compiles a "what changed since the previous tag" summary from
        # commits, which is what the in-app update dialog then shows to
        # users via the release's "body" field.
        run: |
          gh api "repos/${{ github.repository }}/releases/generate-notes" \
            --method POST \
            --raw-field tag_name="${{ github.ref_name }}" \
            --jq .body > notes.md
          gh release edit ${{ github.ref_name }} --notes-file notes.md
