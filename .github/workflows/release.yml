# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -ldflags "-X main.version=${{ steps.version.outputs.version }}"

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Decode signing certificate
        shell: bash
        run: echo "${{ secrets.WINDOWS_CERT_PFX_BASE64 }}" | base64 --decode > cert.pfx

      - name: Pack and sign
        shell: bash
        run: |
          vpk pack \
            --packId ticketsmith \
            --packVersion ${{ steps.version.outputs.version }} \
            --packDir build/bin \
            --mainExe ticketsmith.exe \
            --packTitle Ticketsmith \
            --packAuthors "Aswin Biju" \
            --icon build/windows/icon.ico \
            --delta None \
            --signParams "/f cert.pfx /p ${{ secrets.WINDOWS_CERT_PASSWORD }} /fd sha256 /tr http://timestamp.digicert.com /td sha256"

      - name: Upload to GitHub Releases
        run: |
          vpk upload github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }} --publish --merge --channel win --tag ${{ github.ref_name }} --releaseName "Ticketsmith ${{ github.ref_name }}"

  macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Generate macOS icon
        run: |
          mkdir icon.iconset
          sips -z 512 512 build/appicon.png --out icon.iconset/icon_512x512.png
          sips -z 256 256 build/appicon.png --out icon.iconset/icon_256x256.png
          sips -z 128 128 build/appicon.png --out icon.iconset/icon_128x128.png
          iconutil -c icns icon.iconset -o build/darwin/icon.icns

      - name: Build
        run: wails build -platform darwin/universal -ldflags "-X main.version=${{ steps.version.outputs.version }}"

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Import signing certificate into a temporary keychain
        run: |
          echo "${{ secrets.MACOS_CERT_P12_BASE64 }}" | base64 --decode > cert.p12
          security create-keychain -p "${{ secrets.MACOS_KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.MACOS_KEYCHAIN_PASSWORD }}" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.MACOS_CERT_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.MACOS_KEYCHAIN_PASSWORD }}" build.keychain
          echo "SIGN_IDENTITY=$(security find-identity -v -p codesigning build.keychain | head -1 | awk -F '"' '{print $2}')" >> "$GITHUB_ENV"

      - name: Pack and sign (no notarization — self-signed, Gatekeeper warning accepted)
        run: |
          vpk pack \
            --packId ticketsmith \
            --packVersion ${{ steps.version.outputs.version }} \
            --packDir build/bin \
            --mainExe ticketsmith \
            --packTitle Ticketsmith \
            --packAuthors "Aswin Biju" \
            --icon build/darwin/icon.icns \
            --delta None \
            --signAppIdentity "$SIGN_IDENTITY" \
            --keychain "$(pwd)/build.keychain"

      - name: Verify UpdateMac location
        run: find Releases -name "*.app" -exec find {} -name "UpdateMac" \;

      - name: Upload to GitHub Releases
        run: |
          vpk upload github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }} --publish --merge --channel osx --tag ${{ github.ref_name }} --releaseName "Ticketsmith ${{ github.ref_name }}"
