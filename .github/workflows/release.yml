# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags — needed to diff against the previous tag
          # when generating release notes below. Default checkout is a
          # shallow single-commit clone, which git log/describe can't walk.
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -ldflags "-X main.version=${{ steps.version.outputs.version }}"

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Decode signing certificate
        shell: bash
        run: echo "${{ secrets.WINDOWS_CERT_PFX_BASE64 }}" | base64 --decode > "$GITHUB_WORKSPACE/cert.pfx"

      - name: Pack and sign
        shell: bash
        run: |
          vpk pack \
            --packId ticketsmith \
            --packVersion ${{ steps.version.outputs.version }} \
            --packDir build/bin \
            --mainExe ticketsmith.exe \
            --packTitle TicketSmith \
            --packAuthors "Aswin Biju" \
            --icon build/windows/icon.ico \
            --delta None \
            --verbose \
            --signParams "/f $GITHUB_WORKSPACE/cert.pfx /p ${{ secrets.WINDOWS_CERT_PASSWORD }} /fd sha256 /tr http://timestamp.digicert.com /td sha256"

      - name: Upload to GitHub Releases
        run: |
          vpk upload github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }} --publish --merge --channel win --tag ${{ github.ref_name }} --releaseName "TicketSmith ${{ github.ref_name }}"

      - name: Auto-generate release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # vpk upload github leaves the release body empty (Velopack has no
        # auto-notes feature — its own --releaseNotes flag just points to a
        # markdown file you'd have to hand-write). GitHub's own "generate
        # release notes" API summarizes merged PRs, but this repo commits
        # straight to main with no PR flow, so it has nothing to list and
        # falls back to just a bare compare-link with no changelog at all.
        # Building notes from commit messages between tags instead actually
        # produces content — that's what the in-app update dialog then shows
        # via the release's "body" field.
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || echo "")
          {
            echo "## What's Changed"
            echo
            if [ -n "$PREV_TAG" ]; then
              git log "$PREV_TAG..${{ github.ref_name }}" --pretty=format:"* %s"
            else
              git log "${{ github.ref_name }}" --pretty=format:"* %s"
            fi
            echo
            if [ -n "$PREV_TAG" ]; then
              echo
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }}"
            fi
          } > notes.md
          gh release edit ${{ github.ref_name }} --notes-file notes.md
